<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shivganga Electricals</title>
</head>
<body style="text-align:center; font-family:Arial, sans-serif; background-color:#f4f4f9; padding:20px;">

    <div style="background-color:#003366; color:white; padding:30px; border-radius:20px;">
        <h1 style="margin:0;">⚡ शिवगंगा इलेक्ट्रिकल्स ⚡</h1>
        <p style="font-size:20px; color:#ffcc00;"><b>आपका भरोसेमंद बिजली का साथी</b></p>
    </div>

    <div style="background-color:white; max-width:500px; margin:20px auto; padding:20px; border-radius:15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2>हमारी सेवाएँ:</h2>
        <ul style="text-align:left;">
            <li>🔧 रिपेयरिंग (पंखे, कूलर, गीजर, वॉशिंग मशीन)</li>
            <li>⚡ नए व पुराने उपकरण</li>
            <li>📦 ओरिजिनल स्पेयर पार्ट्स</li>
        </ul>
        
        <input type="text" id="name" placeholder="नाम" style="width:90%; padding:10px; margin:5px;"><br>
        <input type="text" id="phone" placeholder="मोबाइल" style="width:90%; padding:10px; margin:5px;"><br>
        <input type="text" id="msg" placeholder="क्या चाहिए?" style="width:90%; padding:10px; margin:5px;"><br>
        
        <label style="display:block; margin:10px; font-weight:bold; color:red;">
            <input type="checkbox" id="delivery"> होम डिलीवरी चाहिए
        </label>
        
        <button onclick="send()" style="background:#25d366; color:white; padding:15px; width:95%; border:none; border-radius:10px;">व्हाट्सएप पर भेजें</button>
    </div>

    <script>
        function send() {
            var n = document.getElementById("name").value;
            var p = document.getElementById("phone").value;
            var m = document.getElementById("msg").value;
            var d = document.getElementById("delivery").checked ? "हाँ" : "नहीं";
            var url = "https://wa.me/919410103614?text=नाम: " + n + "%0Aमोबाइल: " + p + "%0Aकाम: " + m + "%0Aहोम डिलीवरी: " + d;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
