<html>
<head>
    <title>Shivganga Electricals</title>
</head>
<body style="text-align:center; font-family:Arial, sans-serif; background-color:#f4f4f9; color:#333; padding:0; margin:0;">

    <div style="background-color:#003366; color:white; padding:30px; border-radius:0 0 20px 20px;">
        <img src="logo.jpeg" alt="Logo" style="width:120px; height:120px; border-radius:50%; border:4px solid white; margin-bottom:15px;">
        <h1 style="margin:0; font-size:28px;">⚡ शिवगंगा इलेक्ट्रिकल्स ⚡</h1>
        <p style="font-size:20px; margin:10px 0 0 0; color:#ffcc00;"><b>आपका भरोसेमंद बिजली का साथी</b></p>
    </div>

    <div style="background-color:white; max-width:600px; margin:30px auto; padding:25px; border-radius:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align:left;">
        <h2 style="color:#003366; border-bottom:2px solid #ffcc00; padding-bottom:10px;">हमारी सेवाएँ व सामान:</h2>
        <ul style="list-style-type:none; padding:0; font-size:18px; line-height: 2.5;">
            <li>🔧 रिपेयरिंग: पंखे, कूलर, गीजर, वॉशिंग मशीन, फ्रिज, मिक्सी</li>
            <li>⚡ सेल्स: नए गीजर, वॉशिंग मशीन और सेकंड हैंड वॉशिंग मशीन</li>
            <li>📦 ओरिजिनल स्पेयर पार्ट्स (सभी उपकरण)</li>
        </ul>

        <h2 style="color:#003366; border-bottom:2px solid #ffcc00; padding-bottom:10px; margin-top:30px;">शेड्यूल बुकिंग / ऑर्डर:</h2>
        <input type="text" id="custname" placeholder="आपका नाम" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="custphone" placeholder="मोबाइल नंबर" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="appliance" placeholder="क्या चाहिए या क्या खराब है?" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        
        <div style="background-color:#f9f9f9; padding:15px; border-radius:10px; margin:15px 0; border:1px dashed #003366;">
            <label style="font-size:18px; cursor:pointer; font-weight:bold; color: #d35400;">
                <input type="checkbox" id="deliveryCheck"> 🛵 मुझे होम डिलीवरी / स्पेयर पार्ट्स मंगवाना है
            </label>
        </div>

        <button onclick="sendWhatsApp()" style="background-color:#25d366; color:white; border:none; padding:15px; font-size:18px; border-radius:10px; cursor:pointer; width:100%; font-weight:bold; margin-top:10px;">व्हाट्सएप पर भेजें</button>
    </div>

    <script>
        function sendWhatsApp() {
            var name = document.getElementById("custname").value;
            var phone = document.getElementById("custphone").value;
            var item = document.getElementById("appliance").value;
            var delivery = document.getElementById("deliveryCheck").checked ? "हाँ (होम डिलीवरी चाहिए)" : "नहीं";
            
            var msg = "*नया ऑर्डर/शिकायत - शिवगंगा इलेक्ट्रिकल्स*%0A%0A" +
                      "*नाम:* " + name + "%0A" +
                      "*मोबाइल:* " + phone + "%0A" +
                      "*कार्य/सामान:* " + item + "%0A" +
                      "*होम डिलीवरी:* " + delivery;
            
            window.open("https://wa.me/919410103614?text=" + msg, "_blank");
        }
    </script>
</body>
</html>
